name: notify-hub

services:
  notify-hub:
    image: notify-hub:0.3.0
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: notify-hub
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:8788:8000"
    volumes:
      - ../data:/data
      - ../logs:/logs
      - ../media:/media
      - ../secrets:/run/secrets:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true
