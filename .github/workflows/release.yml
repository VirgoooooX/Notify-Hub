name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Validate release version and tag
        run: python scripts/check_version.py --tag "${{ github.ref_name }}"
      - name: Check formatting
        run: ruff format --check backend plugins
      - name: Lint
        run: ruff check backend plugins
      - name: Type check
        env:
          PYTHONPATH: backend
        run: mypy backend plugins
      - name: Test
        run: pytest
      - name: Migrate an empty SQLite database
        env:
          NOTIFY_HUB_DATABASE_URL: sqlite+aiosqlite:////tmp/notify-hub-release.db
        run: cd backend && alembic upgrade head
      - name: Audit Python dependencies
        run: |
          python -m pip install "pip-audit>=2.10,<3"
          pip-audit --skip-editable

  validate-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

  publish-docker-image:
    runs-on: ubuntu-latest
    needs: [validate-backend, validate-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build release candidate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          load: true
          tags: notify-hub:release-candidate
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan release candidate image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: notify-hub:release-candidate
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Run Compose smoke test on an empty database
        shell: bash
        run: |
          set -euo pipefail
          cleanup() {
            docker compose -f deploy/docker-compose.release-smoke.yml logs --no-color || true
            docker compose -f deploy/docker-compose.release-smoke.yml down --volumes --remove-orphans || true
          }
          trap cleanup EXIT
          docker compose -f deploy/docker-compose.release-smoke.yml up -d --wait --wait-timeout 90
          PORT=$(docker compose -f deploy/docker-compose.release-smoke.yml port notify-hub 8000 | awk -F: '{print $NF}')
          curl --fail --silent --show-error "http://127.0.0.1:${PORT}/health/live"
          curl --fail --silent --show-error "http://127.0.0.1:${PORT}/health/ready"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Tag and push the verified image
        env:
          RELEASE_TAGS: ${{ steps.meta.outputs.tags }}
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker tag notify-hub:release-candidate "$tag"
            docker push "$tag"
          done <<< "$RELEASE_TAGS"

  create-github-release:
    runs-on: ubuntu-latest
    needs: [publish-docker-image]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          # Find the previous release tag by sorting semver tags and selecting the second one
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | sed -n '2p')

          echo "## Changelog" > release_notes.md
          echo "" >> release_notes.md

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "### Commits" >> release_notes.md
            git log --pretty=format:"* %s (%h)" --abbrev-commit >> release_notes.md
          else
            echo "### Changes since $PREVIOUS_TAG" >> release_notes.md
            git log --pretty=format:"* %s (%h)" "$PREVIOUS_TAG..$CURRENT_TAG" --abbrev-commit >> release_notes.md
            echo "" >> release_notes.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...$CURRENT_TAG" >> release_notes.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
