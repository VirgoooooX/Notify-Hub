name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Check formatting
        run: ruff format --check backend plugins
      - name: Lint
        run: ruff check backend plugins
      - name: Type check
        env:
          PYTHONPATH: backend
        run: mypy backend/app plugins
      - name: Migrate an empty SQLite database
        env:
          NOTIFY_HUB_DATABASE_URL: sqlite+aiosqlite:////tmp/notify-hub-ci.db
        run: cd backend && alembic upgrade head
      - name: Test
        run: pytest
      - name: Audit Python dependencies
        run: python -m pip install pip-audit && pip-audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

  image:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build v0.3.0 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          load: true
          tags: notify-hub:0.3.0
      - name: Scan image
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: notify-hub:0.3.0
          severity: CRITICAL,HIGH
          exit-code: "1"

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan repository secrets
        uses: gitleaks/gitleaks-action@v2
